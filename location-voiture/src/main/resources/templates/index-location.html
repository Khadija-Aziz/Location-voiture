<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des Locations</title>
    <style>


 body {
     font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
     margin: 0;
     background: linear-gradient(135deg, #e0c3fc, #8ec5fc);
     color: #3a3a3a;
 }


 .navbar {
     background: rgba(255,255,255,0.5);
     padding: 15px 0;
     text-align: center;
     border-bottom: 1px solid #d8d8d8;
     position: sticky;
     top: 0;
     z-index: 100;
     border-radius: 0 0 15px 15px;
 }

 .navbar a {
     color: #5e4b8b;
     margin: 0 20px;
     text-decoration: none;
     font-weight: bold;
     transition: 0.3s;
 }

 .navbar a:hover {
     color: #fff;
     background: #bda0ff;
     padding: 5px 10px;
     border-radius: 8px;
 }


 h1 {
     text-align: center;
     margin: 40px 0 20px 0;
     font-size: 2.8em;
     color: #5e4b8b;
 }


 form {
     max-width: 500px;
     margin: 20px auto;
     background: rgba(255,255,255,0.6);
     padding: 30px;
     border-radius: 20px;
     box-shadow: 0 8px 20px rgba(0,0,0,0.1);
 }

 form label {
     display: block;
     margin-bottom: 5px;
     font-weight: bold;
     color: #5e4b8b;
 }

 form input, form select {
     width: 100%;
     padding: 10px;
     margin-bottom: 15px;
     border-radius: 10px;
     border: 1px solid #d8d8d8;
     outline: none;
     background: #f6f0ff;
     color: #3a3a3a;
 }

 form input::placeholder {
     color: rgba(90, 80, 120, 0.5);
 }

 form button {
     width: 100%;
     padding: 12px;
     border: none;
     border-radius: 10px;
     background: #bda0ff;
     color: #fff;
     font-weight: bold;
     cursor: pointer;
     transition: 0.3s;
 }

 form button:hover {
     background: #8c6eff;
 }


 .container {
     display: flex;
     justify-content: center;
     flex-wrap: wrap;
     gap: 30px;
     padding: 20px;
 }

 .card {
     background: rgba(255, 255, 255, 0.6);
     border-radius: 20px;
     padding: 30px 40px;
     width: 220px;
     text-align: center;
     box-shadow: 0 8px 20px rgba(0,0,0,0.1);
     transition: 0.3s;
 }

 .card:hover {
     transform: translateY(-10px);
     box-shadow: 0 12px 30px rgba(0,0,0,0.15);
 }

 .card h3 {
     font-size: 1.5em;
     margin-bottom: 15px;
     color: #5e4b8b;
 }

 .card h2 {
     font-size: 2.5em;
     margin: 0;
     color: #3a3a3a;
 }

 /* Liens retour */
 a {
     color: #5e4b8b;
     text-decoration: none;
     font-weight: bold;
 }

 a:hover {
     text-decoration: underline;
 }


 table {
     width: 90%;
     margin: 20px auto;
     border-collapse: collapse;
     background: rgba(255,255,255,0.6);
     border-radius: 15px;
     overflow: hidden;
 }

 th, td {
     padding: 12px 15px;
     text-align: center;
     color: #3a3a3a;
 }

 th {
     background: #d8c3ff;
 }

 tr:nth-child(even) {
     background: #f3e8ff;
 }

 tr:hover {
     background: #e0c3fc;
 }


 @media (max-width: 768px) {
     .container, table {
         flex-direction: column;
         width: 95%;
     }
 }
    </style>
</head>
<body>
<div class="navbar">
    <a th:href="@{/}">Accueil</a>
    <a th:href="@{/clients}">Clients</a>
    <a th:href="@{/voitures}">Voitures</a>
    <a th:href="@{/locations}">Locations</a>
    <a th:href="@{/stats}">Statistiques</a>
</div>
<h1>Liste des Locations</h1>
<a th:href="@{/locations/new}">Nouvelle Location</a>
<table border="1">
    <tr>
        <th>ID</th>
        <th>Client</th>
        <th>Voiture</th>
        <th>Date Début</th>
        <th>Date Fin</th>
        <th>Montant</th>
        <th>Statut</th>
        <th>Actions</th>
    </tr>
    <tr th:each="loc : ${locations}">
        <td th:text="${loc.id}"></td>
        <td th:text="${loc.client.nom}"></td>
        <td th:text="${loc.voiture.marque}"></td>
        <td th:text="${loc.dateDebut}"></td>
        <td th:text="${loc.dateFin}"></td>
        <td th:text="${loc.montantTotal}"></td>
        <td th:text="${loc.statut}"></td>
        <td>
            <a th:href="@{/locations/edit/{id}(id=${loc.id})}">Edit</a> |
            <a th:href="@{/locations/delete/{id}(id=${loc.id})}">Delete</a>
        </td>
    </tr>
</table>
</body>
</html>
