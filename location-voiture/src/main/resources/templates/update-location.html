<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifier Location</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #e0c3fc, #8ec5fc);
            color: #3a3a3a;
        }

        .navbar {
            background: rgba(255,255,255,0.5);
            padding: 15px 0;
            text-align: center;
            border-bottom: 1px solid #d8d8d8;
            position: sticky;
            top: 0;
            z-index: 100;
            border-radius: 0 0 15px 15px;
        }

        .navbar a {
            color: #5e4b8b;
            margin: 0 20px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .navbar a:hover {
            color: #fff;
            background: #bda0ff;
            padding: 5px 10px;
            border-radius: 8px;
        }

        h1 {
            text-align: center;
            margin: 40px 0 20px 0;
            font-size: 2.8em;
            color: #5e4b8b;
        }

        form {
            max-width: 500px;
            margin: 20px auto;
            background: rgba(255,255,255,0.6);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        form label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #5e4b8b;
        }

        form input, form select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #d8d8d8;
            outline: none;
            background: #f6f0ff;
            color: #3a3a3a;
        }

        form button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #bda0ff;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }

        form button:hover {
            background: #8c6eff;
        }
    </style>
</head>

<body>

<div class="navbar">
    <a th:href="@{/}">Accueil</a>
    <a th:href="@{/clients}">Clients</a>
    <a th:href="@{/voitures}">Voitures</a>
    <a th:href="@{/locations}">Locations</a>
    <a th:href="@{/stats}">Statistiques</a>
</div>

<h1>Modifier Location</h1>

<form th:action="@{/locations/update/{id}(id=${location.id})}"
      th:object="${location}" method="post">

    <!-- CLIENT -->
    <label>Client:</label>
    <select th:field="*{client.id}">
        <option th:each="c : ${clients}"
                th:value="${c.id}"
                th:text="${c.nom}">
        </option>
    </select>


    <label>Voiture:</label>
    <select th:field="*{voiture.id}">
        <option th:each="v : ${voitures}"
                th:value="${v.id}"
                th:text="${v.marque + ' - ' + v.immatriculation}">
        </option>
    </select>


    <label>Date Début:</label>
    <input type="date" th:field="*{dateDebut}" />

    <label>Date Fin:</label>
    <input type="date" th:field="*{dateFin}" />


    <label>Statut:</label>
    <select th:field="*{statut}">
        <option value="En cours">En cours</option>
        <option value="Terminée">Terminée</option>
        <option value="Annulée">Annulée</option>
    </select>

    <button type="submit">Mettre à jour</button>

</form>

<a th:href="@{/locations}">Retour</a>

</body>
</html>
